<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMIAS — Admin Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📻</text></svg>">
  <link rel="stylesheet" href="/admin/css/app.css">
</head>
<body>
  <div id="app">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">📡</span>
        <div class="sidebar-brand">
          <span class="sidebar-title">TenX Radar</span>
          <span class="sidebar-subtitle">Airplay Console</span>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="nav-item" href="#/dashboard" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="nav-item" href="#/stations" data-page="stations">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49M7.76 7.76a6 6 0 0 0 0 8.49M20.07 4l-1.41 1.41A9 9 0 0 1 20.07 4zM3.93 4l1.41 1.41A9 9 0 0 0 3.93 4zM12 1v3M12 20v3"/></svg>
          Stations & Sources
        </a>
        <a class="nav-item" href="#/play-events" data-page="play-events">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          Play Events Stream
        </a>
        <a class="nav-item" href="#/review" data-page="review">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Review Queue
          <span class="nav-badge" id="nav-pending-badge" hidden>0</span>
        </a>
        <a class="nav-item" href="#/spotify-metadata" data-page="spotify-metadata">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Metadata Enrichment
        </a>
        <a class="nav-item" href="#/reports" data-page="reports">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Reports
        </a>
        <a class="nav-item" href="#/playlist" data-page="playlist">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Playlist
        </a>
        <a class="nav-item" href="#/charts" data-page="charts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          ARIA Charts
        </a>
        <a class="nav-item" href="#/webhooks" data-page="webhooks">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Webhooks
        </a>
        <a class="nav-item" href="#/backfill" data-page="backfill">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Backfill
        </a>
        <a class="nav-item" href="#/operations-guardrails" data-page="operations-guardrails">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Operations & Safety
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="/docs" target="_blank" class="sidebar-link">API Docs ↗</a>
        <span class="api-status checking" id="api-status">Checking…</span>
      </div>
    </aside>

    <main id="main">
      <header class="page-header">
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <div class="page-actions" id="page-actions"></div>
      </header>
      <div id="page-content" class="page-content">
        <div class="loader-center"><div class="loader"></div></div>
      </div>
    </main>

  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Modal</h3>
        <button class="modal-close" id="modal-close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="/admin/js/app.js"></script>
</body>
</html>
