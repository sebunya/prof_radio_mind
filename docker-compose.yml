services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    # Pass 2 will add depends_on: db once DATABASE_URL is wired
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rmias}
      POSTGRES_USER: ${POSTGRES_USER:-rmias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rmias}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rmias}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
