# Loki configuration for RMIAS local development.
# Single-binary mode, filesystem storage, no auth required.
# Logs are retained for 31 days then automatically purged by the compactor.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

limits_config:
  # 31-day rolling retention
  retention_period: 744h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # Allows label-value pairs up to this length
  max_label_value_length: 2048

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
  compaction_interval: 10m
