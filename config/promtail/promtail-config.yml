# Promtail configuration for RMIAS.
# Discovers all Docker containers via the Docker socket and ships their logs to Loki.
# JSON log lines (emitted by the RMIAS app) are parsed to extract level and logger
# as Loki stream labels — enabling fast filtered queries in Grafana.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip leading slash from container name: /proj-app-1 → proj-app-1
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container

      # Promote Docker Compose service and project labels
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project

    pipeline_stages:
      # Parse RMIAS JSON log lines to extract structured fields
      - json:
          expressions:
            level: level
            logger: logger
      # Promote level and logger as Loki stream labels
      - labels:
          level:
          logger:
      # Drop lines that were not JSON (e.g. raw uvicorn startup text);
      # they still land in Loki under their container label — just without
      # level/logger labels.
