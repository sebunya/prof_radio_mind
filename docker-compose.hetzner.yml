---
# Production Docker Compose for Hetzner Cloud deployment.
#
# Usage:
#   cp .env.hetzner .env.production
#   # edit .env.production with real secrets
#   docker compose -f docker-compose.hetzner.yml --env-file .env.production up -d
#
# Key differences from development compose:
#   - No hot-reload (develop.watch removed)
#   - DB port not exposed to host (internal network only)
#   - Resource limits set on all services
#   - Nginx reverse proxy with HTTPS termination
#   - Named volumes with explicit driver options
#
# Observability services (PgHero, Uptime Kuma, Grafana/Loki) run on the
# internal network only — no ports are exposed to the internet.
# Access them in production via SSH tunnel, e.g.:
#   ssh -L 8081:localhost:8081 -L 3000:localhost:3000 -L 3001:localhost:3001 user@your-server
# Then open http://localhost:8081 (PgHero), http://localhost:3000 (Grafana),
# http://localhost:3001 (Uptime Kuma) in your local browser.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    expose:
      - "8000"
    env_file:
      - .env.production
    environment:
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - raw_payloads:/data/raw_payloads
    restart: unless-stopped
    networks:
      - internal
      - proxy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rmias}
      POSTGRES_USER: ${POSTGRES_USER:-rmias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rmias}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/rmias.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done'
    restart: unless-stopped

  # ── PgHero: PostgreSQL performance dashboard ──────────────────────────────
  # Access via SSH tunnel: ssh -L 8081:localhost:8081 user@server
  pghero:
    image: ankane/pghero:latest
    environment:
      DATABASE_URL: ${PGHERO_DATABASE_URL:?PGHERO_DATABASE_URL is required}
      PGHERO_USERNAME: ${PGHERO_USERNAME:?PGHERO_USERNAME is required}
      PGHERO_PASSWORD: ${PGHERO_PASSWORD:?PGHERO_PASSWORD is required}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Uptime Kuma: self-hosted uptime monitoring ────────────────────────────
  # Access via SSH tunnel: ssh -L 3001:localhost:3001 user@server
  uptime-kuma:
    image: louislam/uptime-kuma:1
    expose:
      - "3001"
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Loki: log aggregation backend ────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.10
    expose:
      - "3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Promtail: Docker log collector → Loki ────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.10
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - internal
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana: dashboards & log explorer ───────────────────────────────────
  # Access via SSH tunnel: ssh -L 3000:localhost:3000 user@server
  grafana:
    image: grafana/grafana:11.4.0
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: warn
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  raw_payloads:
    driver: local
  uptime_kuma_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
