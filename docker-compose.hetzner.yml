---
# Production Docker Compose for Hetzner Cloud deployment.
#
# Usage:
#   cp .env.hetzner .env.production
#   # edit .env.production with real secrets
#   docker compose -f docker-compose.hetzner.yml --env-file .env.production up -d
#
# Key differences from development compose:
#   - No hot-reload (develop.watch removed)
#   - DB port not exposed to host (internal network only)
#   - Resource limits set on all services
#   - Nginx reverse proxy with HTTPS termination
#   - Named volumes with explicit driver options

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    expose:
      - "8000"
    env_file:
      - .env.production
    environment:
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - raw_payloads:/data/raw_payloads
    restart: unless-stopped
    networks:
      - internal
      - proxy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rmias}
      POSTGRES_USER: ${POSTGRES_USER:-rmias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rmias}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/rmias.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done'
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  raw_payloads:
    driver: local
