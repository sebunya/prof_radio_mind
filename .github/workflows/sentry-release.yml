name: Sentry Release

# Creates a Sentry release on every push to main/master.
# This enables: suspect commits, release health tracking, and better
# error grouping by release version in the Sentry dashboard.
#
# Required secrets:
#   SENTRY_AUTH_TOKEN  — from https://sentry.io → Settings → Auth Tokens
#   SENTRY_ORG         — your Sentry organisation slug
#   SENTRY_PROJECT     — your Sentry project slug

on:
  push:
    branches: [main, master]

jobs:
  sentry-release:
    name: Create Sentry release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so sentry-cli can associate commits

      - name: Install sentry-cli
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli --version

      - name: Create & finalise Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          VERSION="${{ github.sha }}"

          # 1. Create the release
          sentry-cli releases new "$VERSION"

          # 2. Associate all commits since the previous release
          sentry-cli releases set-commits "$VERSION" --auto

          # 3. Mark the release as deployed to the production environment
          sentry-cli releases deploys new \
            --env production \
            --name "deploy-${VERSION:0:8}" \
            "$VERSION"

          # 4. Finalise
          sentry-cli releases finalize "$VERSION"

          echo "Sentry release $VERSION created and deployed."
